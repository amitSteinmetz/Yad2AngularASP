<div class="relative inline-block text-right" (mouseleave)="closeMenu()">
  <!-- Trigger -->
  <button
    (click)="toggleMenu()"
    (mouseenter)="user() && isMenuOpen.set(true)"
    class="flex items-center gap-2 px-3 py-1.5 rounded-full hover:bg-gray-100 transition-all duration-200 group"
  >
    @if (user()?.isLoggedIn) {
    <!-- User Avatar -->
    <div
      class="w-10 h-10 rounded-full overflow-hidden border-2 border-orange-100 flex items-center justify-center bg-orange-50 text-orange-600 font-bold shadow-sm group-hover:border-orange-200 transition-colors"
    >
      @if (user()?.avatarUrl) {
      <img [src]="user()?.avatarUrl" class="w-full h-full object-cover" [alt]="user()?.firstName" />
      } @else {
      <span class="text-sm tracking-tighter">{{ userInitials() }}</span>
      }
    </div>
    <span class="text-sm font-semibold text-gray-700 hidden sm:block">
      {{ user()?.firstName }}
    </span>
    } @else {
    <!-- Guest Avatar -->
    <div
      class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-400 border border-gray-200 shadow-sm group-hover:bg-gray-200 transition-colors"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-6 w-6"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
        />
      </svg>
    </div>
    <span class="text-sm font-semibold text-gray-700">התחברות</span>
    }
  </button>

  <!-- Dropdown Modal -->
  @if (user()?.isLoggedIn && isMenuOpen()) {
  <app-user-menu-dropdown [isOpen]="isMenuOpen()" (onMouseEnter)="isMenuOpen.set(true)" />
  }
</div>
