<header
  class="sticky top-0 z-50 bg-white shadow-md border-b border-gray-200 transition-all duration-300"
>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16 md:h-20">
      <!-- Logo -->
      <div class="flex-shrink-0">
        <a routerLink="/" class="flex items-center">
          <img
            src="images/logo.svg"
            alt="Yad2 Logo"
            class="h-8 md:h-10 w-auto hover:opacity-80 transition-opacity"
          />
        </a>
      </div>

      <!-- Desktop Navigation -->
      <nav class="hidden md:flex items-center gap-1 lg:gap-2">
        @for (category of categories; track $index) {
        <a
          [routerLink]="category.route"
          class="px-3 lg:px-4 py-2 text-sm lg:text-base font-medium text-gray-700 hover:text-orange-600 hover:bg-orange-50 rounded-lg transition-all duration-200 whitespace-nowrap"
        >
          {{ category.label }}
        </a>
        }
      </nav>

      <!-- Publish Button -->
      <div class="flex items-center gap-4">
        <div class="hidden sm:block">
          <app-publish-button />
        </div>

        <!-- Mobile Menu Button -->
        <button
          class="md:hidden p-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors"
          aria-label="תפריט"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            />
          </svg>
        </button>
      </div>
    </div>

    <!-- Mobile Navigation -->
    <nav class="md:hidden pb-4 space-y-1">
      @for (category of categories; track $index) {
      <a
        [routerLink]="category.route"
        class="block px-4 py-2 text-sm font-medium text-gray-700 hover:text-orange-600 hover:bg-orange-50 rounded-lg transition-all duration-200"
      >
        {{ category.label }}
      </a>
      }
      <div class="px-4 pt-2 sm:hidden">
        <app-publish-button />
      </div>
    </nav>
  </div>
</header>
