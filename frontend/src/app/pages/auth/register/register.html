<div class="auth-container">
  <div class="header">
    <div class="logo">
      <img src="https://www.yad2.co.il/y2assets/images/header/logo.svg" alt="yad2 logo" />
    </div>
  </div>

  <main class="auth-main">
    <!-- Left Section -->
    <div class="info-section">
      <h1 class="info-title">
        לקנות מהר, למכור מהר.<br />
        ויש לנו אחלה כלים לזה.
      </h1>
      <div class="info-icons">
        <div class="icon-item">
          <div class="icon-circle">
            <img
              src="https://www.yad2.co.il/y2assets/images/auth/personal-area.svg"
              alt="Personal Area"
            />
          </div>
          <span>אזור אישי</span>
        </div>
        <div class="icon-item">
          <div class="icon-circle">
            <img
              src="https://www.yad2.co.il/y2assets/images/auth/publish-ad.svg"
              alt="Publish Ad"
            />
          </div>
          <span>פרסום מודעה</span>
        </div>
        <div class="icon-item">
          <div class="icon-circle">
            <img src="https://www.yad2.co.il/y2assets/images/auth/chat.svg" alt="Chat" />
          </div>
          <span>צ'אט</span>
        </div>
        <div class="icon-item">
          <div class="icon-circle">
            <img src="https://www.yad2.co.il/y2assets/images/auth/alerts.svg" alt="Alerts" />
            <span class="badge">1</span>
          </div>
          <span>התראות</span>
        </div>
      </div>
    </div>

    <!-- Right Section -->
    <div class="form-section">
      <div class="auth-card">
        <h2 class="form-title">נעים להכיר, הצטרפו אלינו</h2>

        <div class="social-buttons">
          <button class="social-btn google">
            <img src="https://www.yad2.co.il/y2assets/images/auth/google-icon.svg" alt="Google" />
            גוגל
          </button>
          <button class="social-btn apple">
            <img src="https://www.yad2.co.il/y2assets/images/auth/apple-icon.svg" alt="Apple" />
            אפל
          </button>
        </div>

        <div class="divider">
          <span>או הרשמו דרך המייל</span>
        </div>

        <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
          <div class="form-group">
            <label for="firstName">שם פרטי</label>
            <input
              type="text"
              id="firstName"
              name="firstName"
              [(ngModel)]="fullName"
              required
              class="form-input"
            />
          </div>

          <div class="form-group">
            <label for="email">מייל</label>
            <input
              type="email"
              id="email"
              name="email"
              [(ngModel)]="email"
              required
              class="form-input"
            />
          </div>

          <div class="form-group">
            <label for="password">סיסמה</label>
            <div class="password-input-wrapper">
              <input
                type="password"
                id="password"
                name="password"
                [(ngModel)]="password"
                required
                class="form-input"
              />
            </div>
          </div>

          <button type="submit" class="submit-btn" [disabled]="!registerForm.form.valid">
            הרשמה
          </button>
        </form>

        <div class="footer-link">
          <span>כבר יש לך חשבון?</span>
          <a routerLink="/auth/login">להתחברות</a>
        </div>
      </div>
    </div>
  </main>
</div>
